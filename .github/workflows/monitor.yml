name: Stock Momentum Monitor

on:
  schedule:
    # Runs every minute Mon-Fri. Covers 4AM-9AM ET (8AM-1PM UTC in EDT).
    # The Python script checks if current time is within WINDOW_START-WINDOW_END
    # and exits early if outside — so this wide cron is safe.
    - cron: '* 8-13 * * 1-5'
  workflow_dispatch:
    inputs:
      window_start:
        description: 'Window start time ET (HH:MM, 24hr e.g. 04:00)'
        required: false
        default: '04:00'
      window_end:
        description: 'Window end time ET (HH:MM, 24hr e.g. 05:00)'
        required: false
        default: '05:00'

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pytz

      - name: Run momentum scanner
        env:
          ALPACA_API_KEY:    ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          WINDOW_START:      ${{ github.event.inputs.window_start || '04:00' }}
          WINDOW_END:        ${{ github.event.inputs.window_end   || '05:00' }}
          PRICE_MIN:         "1"
          PRICE_MAX:         "20"
          MIN_VOLUME:        "100000"
        run: python stock_monitor.py

      - name: Commit & push updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/stocks.json docs/data/watchlist.json || true
          git diff --cached --quiet || git commit -m "📊 Scan $(date -u '+%H:%M UTC')"
          git push
