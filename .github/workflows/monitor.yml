name: Stock Momentum Monitor

on:
  schedule:
    # Runs every minute Mon–Fri, 9:30 AM – 11:05 AM ET (13:30–15:05 UTC in EDT)
    # GitHub Actions cron only supports per-minute granularity at the job level.
    # The Python script itself checks if it's within your configured window.
    - cron: '* 13-15 * * 1-5'   # 9 AM–11 AM ET (UTC-4 EDT) — covers the window with buffer

  workflow_dispatch:  # Manual trigger for testing

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install yfinance

      - name: Run momentum scanner
        run: python stock_monitor.py

      - name: Commit & push updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/stocks.json
          git diff --cached --quiet || git commit -m "📊 Scan $(date -u '+%H:%M UTC')"
          git push
