name: Backtest — Momentum Reversal

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: 'Start date (YYYY-MM-DD)'
        required: true
        default: '2026-05-22'
      end_date:
        description: 'End date (YYYY-MM-DD)'
        required: true
        default: '2026-05-22'
      window_start:
        description: 'Window start time ET (HH:MM, 24hr format e.g. 04:00)'
        required: false
        default: '04:00'
      window_end:
        description: 'Window end time ET (HH:MM, 24hr format e.g. 05:00)'
        required: false
        default: '05:00'
      watchlist:
        description: 'Stocks — comma separated (e.g. PCLA,AAPL). Leave blank to auto-scan $1–$20 universe'
        required: false
        default: ''
      price_min:
        description: 'Min stock price $ (used when watchlist is blank)'
        required: false
        default: '1'
      price_max:
        description: 'Max stock price $ (used when watchlist is blank)'
        required: false
        default: '20'
      min_volume:
        description: 'Min avg daily volume (used when watchlist is blank)'
        required: false
        default: '100000'
      momentum_threshold:
        description: 'Momentum threshold % (e.g. 20)'
        required: false
        default: '20.0'
      reversal_threshold:
        description: 'Reversal threshold % (e.g. 2)'
        required: false
        default: '2.0'

jobs:
  backtest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pytz pandas

      - name: Run backtest
        env:
          START_DATE:         ${{ github.event.inputs.start_date }}
          END_DATE:           ${{ github.event.inputs.end_date }}
          WINDOW_START:       ${{ github.event.inputs.window_start }}
          WINDOW_END:         ${{ github.event.inputs.window_end }}
          WATCHLIST:          ${{ github.event.inputs.watchlist }}
          PRICE_MIN:          ${{ github.event.inputs.price_min }}
          PRICE_MAX:          ${{ github.event.inputs.price_max }}
          MIN_VOLUME:         ${{ github.event.inputs.min_volume }}
          MOMENTUM_THRESHOLD: ${{ github.event.inputs.momentum_threshold }}
          REVERSAL_THRESHOLD: ${{ github.event.inputs.reversal_threshold }}
          ALPACA_API_KEY:     ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY:  ${{ secrets.ALPACA_SECRET_KEY }}
        run: python backtest.py

      - name: Commit & push results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "=== backtest.json content preview ==="
          python3 -c "import json; d=json.load(open('docs/data/backtest.json')); print('results count:', len(d.get('results',[])), '| summary:', d.get('summary'))"
          git add docs/data/backtest.json
          git add docs/data/watchlist.json 2>/dev/null || true
          git status
          git diff --cached --quiet && echo "Nothing to commit" || git commit -m "📈 Backtest ${{ github.event.inputs.start_date }} → ${{ github.event.inputs.end_date }} [${{ github.event.inputs.window_start }}-${{ github.event.inputs.window_end }}]"
          git push
